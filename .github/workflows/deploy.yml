name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/entertainment-ai:latest .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/entertainment-ai:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/entertainment-ai:latest

            sudo docker stop entertainment-ai || true
            sudo docker rm entertainment-ai || true

            sudo docker run -d \
              -p 8501:5000 \
              --name entertainment-ai \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              -e TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/entertainment-ai:latest
